<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: transparent; 
            margin: 0;
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animation-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1100px; /* Spans across your layout */
            background: transparent;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 1. Bumped up font size to match the larger loop */
        .path-label {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 600;
            fill: #000000;
            letter-spacing: 1px;
        }

        .flight-path {
            stroke: #000000;
            stroke-width: 3.5; /* Slightly thicker line for the larger scale */
            stroke-dasharray: 6, 6; 
            fill: none;
        }

        /* 2. Updated animation path to match the larger 160px radius circle coordinates */
        .airplane {
            offset-path: path('M 340 250 A 160 160 0 1 1 660 250 A 160 160 0 1 1 340 250'); 
            offset-rotate: auto 90deg; 
            animation: fly 8s infinite linear; /* Eased to 8s since the plane has a longer track to cover */
        }

        @keyframes fly {
            0% {
                offset-distance: 0%;
            }
            100% {
                offset-distance: 100%;
            }
        }
    </style>
</head>
<body>

<div class="animation-container">
    <svg viewBox="0 0 1000 500">
        
        <text x="310" y="257" text-anchor="end" class="path-label">YEAR-END</text>

        <path class="flight-path" d="M 340 250 A 160 160 0 1 1 660 250 A 160 160 0 1 1 340 250" />
        
        <text x="690" y="257" text-anchor="start" class="path-label">MID-YEAR</text>
        
        <g class="airplane">
            <path d="M15.42,12.31,9,8.5V4.25a1.25,1.25,0,0,0-2.5,0V8.5L.08,12.31a.5.5,0,0,0,.24.94H6.5V17.5l-2,1.5v1l3.5-1,3.5,1v-1l-2-1.5V13.25h6.18a.5.5,0,0,0,.24-.94Z" 
                  fill="#000000" 
                  transform="scale(3.2) translate(-8, -11)" />
        </g>
    </svg>
</div>

</body>
</html>
