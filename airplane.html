<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extended Airplane Animation with Text</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

  <style>
    /* Centering wrapper for demonstration */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* 2. Made the canvas wider (900px) to give it a longer horizontal feel */
    .canvas {
      position: relative;
      width: 700px;
      height: 250px;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* 3. Style the Poppins labels */
    .path-label {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      fill: #000000;
      letter-spacing: 1px;
    }

    .flight-path {
      stroke: #000000;
      stroke-width: 3;
      stroke-dasharray: 5, 5; 
      fill: none;
    }

    /* 4. Updated offset-path to match the new elongated horizontal zigzag coordinate map */
    .airplane {
      offset-path: path('M 150 220 L 230 150 L 310 200 L 390 130 L 470 180 L 550 120 L 630 170 L 710 140 L 790 220'); 
      offset-rotate: auto 90deg; 
      animation: fly 7s infinite linear;
    }

    @keyframes fly {
      0% {
        offset-distance: 0%;
      }
      100% {
        offset-distance: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="canvas">
    <svg viewBox="0 0 1000 350">
      
      <text x="135" y="226" text-anchor="end" class="path-label">YEAR-END</text>

      <path class="flight-path" d="M 150 220 L 230 150 L 310 200 L 390 130 L 470 180 L 550 120 L 630 170 L 710 140 L 790 220" />
      
      <text x="805" y="226" text-anchor="start" class="path-label">MID-YEAR</text>
      
      <g class="airplane">
        <path d="M15.42,12.31,9,8.5V4.25a1.25,1.25,0,0,0-2.5,0V8.5L.08,12.31a.5.5,0,0,0,.24.94H6.5V17.5l-2,1.5v1l3.5-1,3.5,1v-1l-2-1.5V13.25h6.18a.5.5,0,0,0,.24-.94Z" 
              fill="#000000" 
              transform="scale(2.5) translate(-8, -11)" />
      </g>
    </svg>
  </div>

</body>
</html>
